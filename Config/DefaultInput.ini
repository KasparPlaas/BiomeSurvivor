; ========================================
; INPUT ACTION DEFINITIONS
; Actions are defined as UE5 Enhanced Input assets
; Place in Content/Input/Actions/
; ========================================
;
; Movement:
;   IA_Move         - WASD / Left Stick (Value2D)
;   IA_Look         - Mouse Delta / Right Stick (Value2D)
;   IA_Jump         - Space / Gamepad_FaceButton_Bottom (Bool)
;   IA_Sprint       - Left Shift / Gamepad_LeftThumbstick (Bool)
;   IA_Crouch       - Left Ctrl / Gamepad_RightThumbstick (Bool)
;
; Combat:
;   IA_Attack       - Left Mouse / Gamepad_RightTrigger (Bool)
;   IA_Block        - Right Mouse / Gamepad_LeftTrigger (Bool)
;   IA_Dodge        - Alt / Gamepad_FaceButton_Right (Bool)
;   IA_LockOn       - Middle Mouse / Gamepad_RightShoulder (Bool)
;
; Interaction:
;   IA_Interact     - E / Gamepad_FaceButton_Left (Bool)
;   IA_Reload       - R / Gamepad_FaceButton_Top (Bool)
;
; UI:
;   IA_Inventory    - Tab / Gamepad_Special_Right (Bool)
;   IA_Crafting     - C / Gamepad_DPad_Up (Bool)
;   IA_Map          - M / Gamepad_DPad_Down (Bool)
;   IA_Pause        - Escape / Gamepad_Special_Left (Bool)
;   IA_BuildMode    - B / Gamepad_DPad_Left (Bool)
;
; Building:
;   IA_BuildRotate  - R / Gamepad_RightShoulder (Bool, context-sensitive)
;   IA_BuildPlace   - Left Mouse / Gamepad_RightTrigger (Bool)
;   IA_BuildCancel  - Right Mouse / Gamepad_LeftTrigger (Bool)
;
; Camera:
;   IA_ToggleCamera - V / Gamepad_DPad_Right (Bool)
;   IA_Zoom         - Mouse Wheel / Gamepad_LeftShoulder (Axis1D)
;
; Quickbar:
;   IA_Quickbar1-8  - Keys 1-8 (Bool)
